<html>

<head>
    <title>Registration Form</title>
</head>

<body bgcolor="beige">

    <center>

        <h1>Registration form</h1>

        <img src="registration.jpg" width="100" height="100">

        <br><br>

        <form>

            <!-- NAME -->
            Name:
            <input type="text"
                   placeholder="Enter your name"
                   required
                   minlength="3"
                   maxlength="30"
                   pattern="[A-Za-z ]+"
                   title="Only alphabets allowed">
            <br><br>

            <!-- CONTACT -->
            Contact:
            <input type="tel"
                   value="+91"
                   required
                   pattern="[0-9]{10}"
                   title="Enter 10 digit mobile number">
            <br><br>

            <!-- ENROLLMENT -->
            Enroll-id:
            <input type="text"
                   placeholder="Enter your 14 digit Enrollment"
                   required
                   pattern="[0-9]{14}"
                   title="Enrollment number must be 14 digits">
            <br><br>

            <!-- GENDER -->
            Gender:
            <input type="radio" name="gender" required> male
            <input type="radio" name="gender"> female
            <br><br>

            <!-- DATE -->
            Date of birth:
            <input type="date" required>
            <br><br><br>

            <!-- ADDRESS -->
            Address :
            <textarea rows="6"
                      cols="40"
                      required
                      minlength="10"
                      maxlength="100"
                      placeholder="Enter your address"></textarea>
            <br><br>

            <!-- DEPARTMENT -->
            Department:
            <input type="checkbox"> CSE
            <input type="checkbox"> IT
            <input type="checkbox"> ECE
            <input type="checkbox"> Civil
            <input type="checkbox"> Mech
            <br><br>

            <!-- COURSE -->
            Course :
            <select required>

                <option value="">
                    --- Select Current Course ---
                </option>

                <option>BCA</option>
                <option>B.Tech</option>
                <option>B.Sc IT</option>
                <option>MCA</option>

            </select>

            <br><br>

            <!-- PHOTO -->
            Upload your photo:
            <input type="file"
                   required
                   accept=".jpg,.jpeg,.png">
            <br><br>

            <input type="button" value="upload">

            <br><br>

            <!-- PASSWORD -->
            Enter your password:
            <input type="password"
                   required
                   minlength="6"
                   maxlength="12"
                   placeholder="Enter password">
            <br><br>

            <!-- TIME -->
            Enter time slot:
            <input type="time" required>

            <br><br>

            <!-- SUBMIT -->
            <input type="submit" value="submit">

            <input type="reset" value="reset">

        </form>

    </center>

</body>

</html>
